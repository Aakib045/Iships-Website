<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IShips Admin — Inquiries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #F4F1EA;
      --bg-2:     #ECE7DB;
      --bg-3:     #EDEAE4;
      --ink:      #191A1B;
      --muted:    #63645F;
      --amber:    #E8732B;
      --amber-lt: #FF9A4D;
      --amber-dp: #C85E1E;
      --line:     rgba(25,26,27,.12);
      --line-amb: rgba(232,115,43,.35);
      --unread-bg:#FFF8F3;
      --unread-border: rgba(232,115,43,.5);
      --red:      #C0392B;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { height:100%; }

    body {
      min-height:100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* ── TOPBAR ─────────────────────────────────────── */
    .topbar {
      background: var(--ink);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 62px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-brand {
      font-family: 'Archivo', sans-serif;
      font-weight: 900;
      font-size: 1.15rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #F4F1EA;
    }

    .topbar-brand span { color: var(--amber); }

    .topbar-label {
      font-family: 'Archivo', sans-serif;
      font-weight: 700;
      font-size: .65rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--amber);
      margin-top: 2px;
    }

    /* ── LAYOUT ─────────────────────────────────────── */
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── LOGIN CARD ─────────────────────────────────── */
    #login-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 62px);
      padding: 40px 24px;
    }

    .login-card {
      background: #fff;
      border: 1px solid var(--line);
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
    }

    .login-card .eyebrow {
      font-family: 'Archivo', sans-serif;
      font-weight: 700;
      font-size: .65rem;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--amber-dp);
      margin-bottom: 10px;
    }

    .login-card h1 {
      font-family: 'Archivo', sans-serif;
      font-weight: 900;
      font-size: 1.9rem;
      text-transform: uppercase;
      letter-spacing: -.02em;
      line-height: 1;
      color: var(--ink);
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-family: 'Archivo', sans-serif;
      font-weight: 700;
      font-size: .65rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: .92rem;
      outline: none;
      transition: border-color .2s;
    }

    .field input:focus {
      border-color: var(--amber);
    }

    .btn {
      display: inline-block;
      background: var(--amber);
      color: #0A0A0B;
      padding: 14px 28px;
      font-family: 'Archivo', sans-serif;
      font-weight: 700;
      font-size: .76rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: background .25s;
      width: 100%;
      margin-top: 8px;
    }

    .btn:hover { background: var(--amber-lt); }

    .btn.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 11px 22px;
      width: auto;
      font-size: .7rem;
    }

    .btn.ghost:hover { border-color: var(--amber); color: var(--amber-dp); background: transparent; }

    .btn.sm {
      width: auto;
      padding: 8px 16px;
      font-size: .64rem;
      margin-top: 0;
    }

    .btn.sm.read-btn { background: var(--ink); color: var(--bg); }
    .btn.sm.read-btn:hover { background: var(--amber-dp); color: #fff; }

    .error-msg {
      background: #FEF2F2;
      border: 1px solid #FCA5A5;
      color: var(--red);
      font-size: .82rem;
      padding: 11px 14px;
      margin-top: 14px;
      display: none;
    }

    .error-msg.visible { display: block; }

    /* ── DASHBOARD ──────────────────────────────────── */
    #dashboard-state { display: none; }

    .dash-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 36px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--line);
    }

    .dash-header-left .eyebrow {
      font-family: 'Archivo', sans-serif;
      font-weight: 700;
      font-size: .65rem;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--amber-dp);
      margin-bottom: 8px;
    }

    .dash-header-left h2 {
      font-family: 'Archivo', sans-serif;
      font-weight: 900;
      font-size: 2.2rem;
      text-transform: uppercase;
      letter-spacing: -.02em;
      line-height: 1;
      color: var(--ink);
    }

    .stats-row {
      display: flex;
      gap: 24px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .stat-chip {
      font-family: 'Archivo', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 7px 14px;
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .stat-chip strong { color: var(--ink); font-size: 1rem; display: block; line-height: 1.1; }
    .stat-chip.amber-chip { border-color: var(--line-amb); color: var(--amber-dp); }
    .stat-chip.amber-chip strong { color: var(--amber-dp); }

    .dash-actions { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }

    /* ── INQUIRY CARDS ──────────────────────────────── */
    .inquiry-list { display: flex; flex-direction: column; gap: 14px; }

    .inquiry-card {
      background: #fff;
      border: 1px solid var(--line);
      padding: 24px 28px;
      transition: border-color .2s;
    }

    .inquiry-card.unread {
      background: var(--unread-bg);
      border-color: var(--unread-border);
    }

    .inquiry-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .inquiry-name-block { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .inquiry-name {
      font-family: 'Archivo', sans-serif;
      font-weight: 800;
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: -.01em;
      color: var(--ink);
    }

    .badge-new {
      font-family: 'Archivo', sans-serif;
      font-weight: 800;
      font-size: .58rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      background: var(--amber);
      color: #0A0A0B;
      padding: 3px 9px;
    }

    .inquiry-date {
      font-size: .75rem;
      color: var(--muted);
      font-family: 'Archivo', sans-serif;
      font-weight: 600;
      letter-spacing: .04em;
      white-space: nowrap;
    }

    .inquiry-meta {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px 24px;
      margin-bottom: 16px;
    }

    .meta-item { display: flex; flex-direction: column; gap: 2px; }

    .meta-label {
      font-family: 'Archivo', sans-serif;
      font-weight: 700;
      font-size: .6rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meta-value {
      font-size: .88rem;
      color: var(--ink);
    }

    .meta-value a { color: var(--amber-dp); text-decoration: underline; text-underline-offset: 2px; }
    .meta-value a:hover { color: var(--amber); }

    .inquiry-message {
      background: var(--bg-2);
      border-left: 3px solid var(--amber);
      padding: 14px 18px;
      font-size: .88rem;
      line-height: 1.65;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 16px;
    }

    .inquiry-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    /* ── EMPTY / LOADING / ERROR ────────────────────── */
    .state-msg {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }

    .state-msg .icon {
      font-size: 2.4rem;
      margin-bottom: 14px;
      opacity: .4;
    }

    .state-msg p {
      font-family: 'Archivo', sans-serif;
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    /* ── SPINNER ────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(232,115,43,.3);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 600px) {
      .topbar { padding: 0 18px; }
      .login-card { padding: 36px 24px; }
      .inquiry-card { padding: 18px 16px; }
      .dash-header h2 { font-size: 1.7rem; }
      .inquiry-meta { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- TOPBAR (always visible) -->
<header class="topbar">
  <div>
    <div class="topbar-brand">I<span>SHIPS</span></div>
    <div class="topbar-label">Admin Portal</div>
  </div>
</header>

<!-- ══ LOGIN STATE ══════════════════════════════════════ -->
<div id="login-state">
  <div class="login-card">
    <div class="eyebrow">Secure Access</div>
    <h1>Admin<br>Login</h1>

    <form id="login-form" autocomplete="off">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="login-btn">Log In</button>
      <div class="error-msg" id="login-error"></div>
    </form>
  </div>
</div>

<!-- ══ DASHBOARD STATE ══════════════════════════════════ -->
<div id="dashboard-state">
  <div class="page">

    <div class="dash-header">
      <div class="dash-header-left">
        <div class="eyebrow">Inquiry Management</div>
        <h2>Inquiries</h2>
        <div class="stats-row">
          <div class="stat-chip"><strong id="count-total">—</strong>Total</div>
          <div class="stat-chip amber-chip"><strong id="count-unread">—</strong>Unread</div>
        </div>
      </div>
      <div class="dash-actions">
        <button class="btn ghost" id="refresh-btn">&#8635; Refresh</button>
        <button class="btn ghost" id="logout-btn">Log Out</button>
      </div>
    </div>

    <div id="inquiry-list-wrap"></div>

  </div>
</div>

<script>
(function () {
  const API = 'https://iships-backend-production.up.railway.app';

  let token = null;

  // ── DOM refs ──────────────────────────────────────────
  const loginState     = document.getElementById('login-state');
  const dashState      = document.getElementById('dashboard-state');
  const loginForm      = document.getElementById('login-form');
  const loginBtn       = document.getElementById('login-btn');
  const loginError     = document.getElementById('login-error');
  const usernameInput  = document.getElementById('username');
  const passwordInput  = document.getElementById('password');
  const refreshBtn     = document.getElementById('refresh-btn');
  const logoutBtn      = document.getElementById('logout-btn');
  const countTotal     = document.getElementById('count-total');
  const countUnread    = document.getElementById('count-unread');
  const listWrap       = document.getElementById('inquiry-list-wrap');

  // ── Helpers ───────────────────────────────────────────
  function showLogin(message) {
    dashState.style.display = 'none';
    loginState.style.display = 'flex';
    usernameInput.value = '';
    passwordInput.value = '';
    if (message) {
      loginError.textContent = message;
      loginError.classList.add('visible');
    } else {
      loginError.classList.remove('visible');
    }
  }

  function showDashboard() {
    loginState.style.display = 'none';
    dashState.style.display = 'block';
    loadInquiries();
  }

  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleString('en-GB', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: false
      });
    } catch (_) { return iso; }
  }

  function digitsOnly(str) {
    return (str || '').replace(/\D/g, '');
  }

  // ── Login ─────────────────────────────────────────────
  loginForm.addEventListener('submit', async function (e) {
    e.preventDefault();
    loginError.classList.remove('visible');
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span>Logging in…';

    const username = usernameInput.value.trim();
    const password = passwordInput.value;

    try {
      const res = await fetch(API + '/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (res.status === 401) {
        throw new Error('Invalid credentials. Please try again.');
      }

      if (!res.ok) {
        throw new Error('Server error (' + res.status + '). Please try again.');
      }

      const data = await res.json();
      if (!data.token) throw new Error('Unexpected response from server.');

      token = data.token;
      showDashboard();

    } catch (err) {
      loginError.textContent = err.message || 'Login failed. Check your connection.';
      loginError.classList.add('visible');
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Log In';
    }
  });

  // ── Logout ────────────────────────────────────────────
  logoutBtn.addEventListener('click', function () {
    token = null;
    showLogin();
  });

  // ── Load inquiries ────────────────────────────────────
  refreshBtn.addEventListener('click', loadInquiries);

  async function loadInquiries() {
    refreshBtn.disabled = true;
    refreshBtn.innerHTML = '<span class="spinner"></span>Loading…';
    listWrap.innerHTML = '<div class="state-msg"><div class="icon">⏳</div><p>Fetching inquiries…</p></div>';
    countTotal.textContent = '—';
    countUnread.textContent = '—';

    try {
      const res = await fetch(API + '/api/inquiries', {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      if (res.status === 401 || res.status === 403) {
        token = null;
        showLogin('Session expired. Please log in again.');
        return;
      }

      if (!res.ok) throw new Error('Server error (' + res.status + ')');

      const inquiries = await res.json();

      // Sort newest first
      inquiries.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      const unread = inquiries.filter(i => !i.isRead).length;
      countTotal.textContent = inquiries.length;
      countUnread.textContent = unread;

      if (inquiries.length === 0) {
        listWrap.innerHTML = '<div class="state-msg"><div class="icon">📭</div><p>No inquiries yet</p></div>';
        return;
      }

      renderInquiries(inquiries);

    } catch (err) {
      listWrap.innerHTML = '<div class="state-msg"><div class="icon">⚠️</div><p>' + escHtml(err.message || 'Failed to load inquiries') + '</p></div>';
    } finally {
      refreshBtn.disabled = false;
      refreshBtn.innerHTML = '&#8635; Refresh';
    }
  }

  // ── Render ────────────────────────────────────────────
  function renderInquiries(inquiries) {
    const list = document.createElement('div');
    list.className = 'inquiry-list';

    inquiries.forEach(function (inq) {
      list.appendChild(buildCard(inq));
    });

    listWrap.innerHTML = '';
    listWrap.appendChild(list);
  }

  function buildCard(inq) {
    const card = document.createElement('div');
    card.className = 'inquiry-card' + (inq.isRead ? '' : ' unread');
    card.id = 'card-' + inq._id;

    const phoneDigits = digitsOnly(inq.phone);
    const waLink = phoneDigits
      ? '<a href="https://wa.me/' + phoneDigits + '" target="_blank" rel="noopener">WhatsApp</a>'
      : '';
    const phoneHtml = inq.phone
      ? '<a href="tel:' + escAttr(inq.phone) + '">' + escHtml(inq.phone) + '</a>' + (waLink ? ' &nbsp;·&nbsp; ' + waLink : '')
      : '<span style="color:var(--muted)">—</span>';

    const emailHtml = inq.email
      ? '<a href="mailto:' + escAttr(inq.email) + '">' + escHtml(inq.email) + '</a>'
      : '<span style="color:var(--muted)">—</span>';

    const markBtn = inq.isRead
      ? ''
      : '<button class="btn sm read-btn" data-id="' + escAttr(inq._id) + '">Mark as read</button>';

    card.innerHTML =
      '<div class="inquiry-card-top">' +
        '<div class="inquiry-name-block">' +
          '<span class="inquiry-name">' + escHtml(inq.name || '—') + '</span>' +
          (inq.isRead ? '' : '<span class="badge-new">New</span>') +
        '</div>' +
        '<span class="inquiry-date">' + formatDate(inq.createdAt) + '</span>' +
      '</div>' +
      '<div class="inquiry-meta">' +
        '<div class="meta-item"><span class="meta-label">Email</span><span class="meta-value">' + emailHtml + '</span></div>' +
        '<div class="meta-item"><span class="meta-label">Phone</span><span class="meta-value">' + phoneHtml + '</span></div>' +
        '<div class="meta-item"><span class="meta-label">Division</span><span class="meta-value">' + escHtml(inq.division || '—') + '</span></div>' +
      '</div>' +
      '<div class="inquiry-message">' + escHtml(inq.message || '') + '</div>' +
      (markBtn ? '<div class="inquiry-footer">' + markBtn + '</div>' : '');

    // Mark as read handler
    const btn = card.querySelector('.read-btn');
    if (btn) {
      btn.addEventListener('click', function () {
        markRead(inq._id, card);
      });
    }

    return card;
  }

  // ── Mark as read ──────────────────────────────────────
  async function markRead(id, card) {
    const btn = card.querySelector('.read-btn');
    if (btn) { btn.disabled = true; btn.textContent = '…'; }

    try {
      const res = await fetch(API + '/api/inquiries/' + id + '/read', {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + token }
      });

      if (res.status === 401 || res.status === 403) {
        token = null;
        showLogin('Session expired. Please log in again.');
        return;
      }

      if (!res.ok) throw new Error('Server error (' + res.status + ')');

      // Update card in place
      card.classList.remove('unread');
      const badge = card.querySelector('.badge-new');
      if (badge) badge.remove();
      const footer = card.querySelector('.inquiry-footer');
      if (footer) footer.remove();

      // Update unread count
      const current = parseInt(countUnread.textContent, 10);
      if (!isNaN(current) && current > 0) {
        countUnread.textContent = current - 1;
      }

    } catch (err) {
      if (btn) { btn.disabled = false; btn.textContent = 'Mark as read'; }
      alert('Failed to mark as read: ' + (err.message || 'Unknown error'));
    }
  }

  // ── XSS helpers ───────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escAttr(str) {
    return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ── Init ──────────────────────────────────────────────
  showLogin();
})();
</script>
</body>
</html>
